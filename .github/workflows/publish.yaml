name: publish
on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  setup:
    runs-on: ubuntu-latest
    # runs only the branch name starts with 'release/v' and the pull request is merged.
    if: startsWith(github.head_ref, 'releases/v') && github.event.pull_request.merged == true
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      appname: ${{ steps.vars.outputs.appname }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Git Tag name
        id: vars
        run: |
          # 後から参照するために、タグ名とアプリケーション名を出力しておく。
          # タグ名は、ブランチ名から 'releases/v' を取り除いたもの。
          # アプリケーション名は、リポジトリ名からオーナー名を取り除いたもの。
          # $GITHUB_OUTPUT に出力することで、後続のジョブから参照できるようになる。
          echo "tag=${GITHUB_HEAD_REF##*/v}" >> $GITHUB_OUTPUT
          echo "appname=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

      - name: Set git identity
        run: |
          # git tag を push するので、git のユーザ名とメールアドレスを設定しておく。
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and Push tag
        run: |
          # タグを作成して、リモートに push する。
          git tag v${{ steps.vars.outputs.tag }}
          git push origin v${{ steps.vars.outputs.tag }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh コマンドを使って、リリースを作成する。
          # draft として作成する。後続のジョブで、ドラフトを false にする。
          gh release create v${{ steps.vars.outputs.tag }} --verify-tag --generate-notes --title "Release v${{ steps.vars.outputs.tag }}" --draft

  publish:
    runs-on: ${{ matrix.os }}
    needs: setup
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            architecture: arm64
            os_name: linux
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: amd64
            os_name: linux
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            architecture: arm64
            os_name: darwin
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ""
          - os: macos-latest
            architecture: amd64
            os_name: darwin
            target: x86_64-apple-darwin
            artifact_name: ${{ needs.setup.outputs.appname }}
            ext: ""
    outputs:
      tag: ${{ needs.setup.outputs.tag }}
    steps:
      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: build
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}
          cargo install cargo-zigbuild
          # zigbuild を使って、クロスコンパイルする。
          cargo zigbuild --release --target ${{ matrix.target }}

      - name: Create distribution files.
        run: |
          # 配布用のファイルを作成する。
          ASSET_NAME=${{ needs.setup.outputs.appname }}-${{ needs.setup.outputs.tag}}_${{ matrix.architecture }}_${{ matrix.os_name }}
          mkdir -p dist/$ASSET_NAME
          cp target/${{ matrix.target }}/release/${{ needs.setup.outputs.appname }}${{ matrix.ext }} dist/$ASSET_NAME/
          cp README.md LICENSE dist/$ASSET_NAME/
          tar cvfz dist/${ASSET_NAME}.tar.gz -C dist $ASSET_NAME

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh コマンドを使って、リリースにアセットをアップロードする。
          ASSET_NAME=${{ needs.setup.outputs.appname }}-${{ needs.setup.outputs.tag}}_${{ matrix.architecture }}_${{ matrix.os_name }}
          gh release upload v${{ needs.setup.outputs.tag }} dist/${ASSET_NAME}.tar.gz

  container_image:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        run: |
          chmod +x .github/scripts/build_docker.sh
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,} \
          VERSION=${{ needs.setup.outputs.tag }} \
          PUSH=true \
          ./.github/scripts/build_docker.sh

  homebrew:
    runs-on: ubuntu-latest
    needs: [setup, publish] # リリース資産（tar.gz）が揃ってから実行する。
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Generate Homebrew formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ needs.setup.outputs.tag }}
          APP=${{ needs.setup.outputs.appname }}

          # リリースにアップ済みの各アーキ向け tar.gz をダウンロードする。
          mkdir -p dist
          for arch_os in arm64_darwin amd64_darwin arm64_linux amd64_linux; do
            gh release download "v${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${APP}-${TAG}_${arch_os}.tar.gz" \
              --dir dist
          done

          # 各 tar.gz の SHA256 を算出する。
          SHA_DARWIN_ARM64=$(sha256sum "dist/${APP}-${TAG}_arm64_darwin.tar.gz" | cut -d' ' -f1)
          SHA_DARWIN_AMD64=$(sha256sum "dist/${APP}-${TAG}_amd64_darwin.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum "dist/${APP}-${TAG}_arm64_linux.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(sha256sum "dist/${APP}-${TAG}_amd64_linux.tar.gz" | cut -d' ' -f1)

          # テンプレートのプレースホルダを埋めて Formula を生成する。
          mkdir -p Formula
          sed \
            -e "s/\${VERSION}/${TAG}/g" \
            -e "s/\${SHA256_DARWIN_ARM64}/${SHA_DARWIN_ARM64}/g" \
            -e "s/\${SHA256_DARWIN_AMD64}/${SHA_DARWIN_AMD64}/g" \
            -e "s/\${SHA256_LINUX_ARM64}/${SHA_LINUX_ARM64}/g" \
            -e "s/\${SHA256_LINUX_AMD64}/${SHA_LINUX_AMD64}/g" \
            .github/templates/lwsm.rb > Formula/lwsm.rb

          cat Formula/lwsm.rb

      - name: Push formula to homebrew-tap
        env:
          # homebrew-tap リポジトリへ push できる PAT（repo 権限）を登録しておくこと。
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          TAG=${{ needs.setup.outputs.tag }}
          OWNER=${GITHUB_REPOSITORY%%/*}

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${OWNER}/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp Formula/lwsm.rb tap/Formula/lwsm.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lwsm.rb
          git commit -m "lwsm ${TAG}"
          git push origin HEAD

  finalize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [publish, container_image, homebrew] # バイナリ・コンテナ・Homebrew の配布完了後に実行する。
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

      - name: Finalize release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh コマンドを使って、ドラフトを false にする（release が immutable であれば、これ以降変更できない）。
          gh release edit v${{ needs.publish.outputs.tag }} --draft=false
