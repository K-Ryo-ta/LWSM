{{ define "main" }}
<article class="mx-auto w-full max-w-3xl px-6 py-16">
  <header class="mb-10">
    {{ with .CurrentSection }}
      <a href="{{ .RelPermalink }}" class="font-mono text-sm text-emerald-400 hover:underline">{{ .Title }}</a>
    {{ end }}
    <h1 class="mt-1 text-3xl font-extrabold text-white lg:text-4xl">{{ .Title }}</h1>
    {{ with .Description }}<p class="mt-3 text-slate-400">{{ . }}</p>{{ end }}
  </header>
  <div class="prose prose-invert max-w-none prose-headings:scroll-mt-24 prose-a:text-sky-400 prose-code:before:content-none prose-code:after:content-none">
    {{ .Content }}
  </div>
</article>
{{ end }}
