{{ define "main" }}
<div class="mx-auto w-full max-w-5xl px-6 py-16">
  <header class="mb-10">
    <h1 class="text-3xl font-extrabold text-white lg:text-4xl"><span class="font-mono text-emerald-400">##</span> {{ .Title }}</h1>
    {{ with .Description }}<p class="mt-3 text-slate-400">{{ . }}</p>{{ end }}
  </header>
  {{ with .Content }}
    <div class="prose prose-invert mb-12 max-w-none prose-a:text-sky-400">{{ . }}</div>
  {{ end }}
  <div class="grid gap-6 md:grid-cols-2">
    {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="group rounded-2xl border border-white/10 bg-white/5 p-7 transition hover:-translate-y-1 hover:border-emerald-400/40 hover:bg-white/10">
        <h2 class="mb-2 text-lg font-bold text-white group-hover:text-emerald-400">{{ .Title }}</h2>
        <p class="text-sm text-slate-400">{{ .Description }}</p>
        <span class="mt-4 inline-block text-sm font-semibold text-sky-400">読む →</span>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
